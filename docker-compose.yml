version: "3.8"
services:
  cost-estimator:
    build: .
    container_name: cost-estimator
    ports:
      - "8082:8080"
    environment:
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-andy.grunes@generac.com}
      - PORT=8080
    volumes:
      - ./data:/app/data
    restart: unless-stopped
