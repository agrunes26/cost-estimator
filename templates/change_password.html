<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Change Password — Cost Estimator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f2;color:#1a1a18;padding:20px}
.header{display:flex;align-items:center;gap:16px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid rgba(0,0,0,0.08)}
.header h1{font-size:20px;flex:1}
.header a{font-size:13px;color:#378ADD;text-decoration:none}
.card{background:#fff;border-radius:12px;padding:24px;max-width:400px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
label{font-size:12px;font-weight:600;color:#73726c;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
input{width:100%;padding:10px 12px;border:1px solid rgba(0,0,0,0.15);border-radius:8px;font-size:14px;margin-bottom:16px}
input:focus{outline:none;border-color:#378ADD}
.btn{padding:12px 24px;background:#378ADD;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn:hover{background:#2a6fb8}
.error{background:#fef2f2;color:#dc2626;padding:10px;border-radius:8px;font-size:13px;margin-bottom:16px}
.success{background:#f0fdf4;color:#16a34a;padding:10px;border-radius:8px;font-size:13px;margin-bottom:16px}
</style>
</head>
<body>
<div class="header">
  <h1>Change Password</h1>
  <a href="/">← Estimator</a>
  {% if is_admin %}<a href="/admin">Admin</a>{% endif %}
  <span style="font-size:13px;color:#73726c">{{ user_name }}</span>
  <a href="/logout">Sign out</a>
</div>
<div class="card">
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  {% if success %}<div class="success">{{ success }}</div>{% endif %}
  <form method="POST" action="/change-password">
    <label>Current Password</label>
    <input type="password" name="current_password" required>
    <label>New Password</label>
    <input type="password" name="new_password" required minlength="6" placeholder="At least 6 characters">
    <label>Confirm New Password</label>
    <input type="password" name="confirm_password" required minlength="6">
    <button class="btn" type="submit">Update Password</button>
  </form>
</div>
</body>
</html>
