<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — Cost Estimator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f2;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#1a1a18}
.card{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:380px;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
h1{font-size:22px;margin-bottom:6px}
.sub{font-size:13px;color:#73726c;margin-bottom:24px}
label{font-size:12px;font-weight:600;color:#73726c;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
input{width:100%;padding:10px 12px;border:1px solid rgba(0,0,0,0.15);border-radius:8px;font-size:14px;margin-bottom:16px}
input:focus{outline:none;border-color:#378ADD}
.btn{width:100%;padding:12px;background:#378ADD;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn:hover{background:#2a6fb8}
.error{background:#fef2f2;color:#dc2626;padding:10px;border-radius:8px;font-size:13px;margin-bottom:16px}
</style>
</head>
<body>
<div class="card">
  <h1>Component Cost Estimator</h1>
  <p class="sub">Sign in to continue</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST" action="/login">
    <label>Email</label>
    <input type="email" name="email" required autofocus>
    <label>Password</label>
    <input type="password" name="password" required>
    <button class="btn" type="submit">Sign in</button>
  </form>
</div>
</body>
</html>
